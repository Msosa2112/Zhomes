workflows:
  capacitor-ios-workflow:
    name: ZHomes iOS Production Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        - ios_signing
      vars:
        XCODE_WORKSPACE: "App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_STORE_APP_ID: 6739819170 # Tu ID de Apple obtenido de tu consola
    scripts:
      - name: Install npm dependencies
        script: |
          cd zhomes-app
          npm install
      - name: Compile React/Vite code
        script: |
          cd zhomes-app
          npm run build
      - name: Recreate iOS Platform Workspace
        script: |
          cd zhomes-app
          rm -rf ios
          npx cap add ios
      - name: Sync Capacitor assets to iOS
        script: |
          cd zhomes-app
          npx cap sync ios
      - name: Cocoapods installation
        script: |
          cd zhomes-app/ios/App
          pod install

      - name: Decode signing files
        script: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          python3 -c "import base64, os; open(os.path.expanduser('~/Library/MobileDevice/Provisioning Profiles/profile.mobileprovision'), 'wb').write(base64.b64decode(os.environ['CM_PROVISIONING_PROFILE'].replace('\n','').replace('\r','')))"
          python3 -c "import base64, os; open('/tmp/ios_distribution.p12', 'wb').write(base64.b64decode(os.environ['CM_CERTIFICATE'].replace('\n','').replace('\r','')))"
      - name: Set up keychain
        script: |
          keychain initialize
          keychain add-certificates -c /tmp/ios_distribution.p12 --certificate-password "$CM_CERTIFICATE_PASSWORD"
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Increment build number
        script: |
          cd zhomes-app/ios/App
          agvtool new-version -all $BUILD_NUMBER
      - name: Build ipa for App Store distribution
        script: |
          cd zhomes-app/ios/App
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - zhomes-app/ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - zhomesreapp@gmail.com # Te avisará cuando la compilación termine
        notify:
          success: true
          failure: true
