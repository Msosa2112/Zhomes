workflows:
  capacitor-ios-workflow:
    name: ZHomes iOS Production Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic # Nombre de tu integración con App Store Connect en el panel de Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.zhomesre.app
      vars:
        XCODE_WORKSPACE: "App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_STORE_APP_ID: 6739819170 # Tu ID de Apple obtenido de tu consola
    scripts:
      - name: Install npm dependencies
        script: |
          cd zhomes-app
          npm install
      - name: Compile React/Vite code
        script: |
          cd zhomes-app
          npm run build
      - name: Sync Capacitor assets to iOS
        script: |
          cd zhomes-app
          npx cap sync ios
      - name: Cocoapods installation
        script: |
          cd zhomes-app/ios/App
          pod install
      - name: Decode signing files
        script: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
          echo "$CM_CERTIFICATE" | base64 --decode > /tmp/ios_distribution.p12
      - name: Set up keychain
        script: |
          keychain initialize
          keychain add-certificates --cert /tmp/ios_distribution.p12 --cert-password "$CM_CERTIFICATE_PASSWORD"
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Increment build number
        script: |
          cd zhomes-app/ios/App
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APP_ID")
          agvtool new-version -all $(($LATEST_BUILD_NUMBER + 1))
      - name: Build ipa for App Store distribution
        script: |
          cd zhomes-app/ios/App
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - zhomes-app/ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - zhomesreapp@gmail.com # Te avisará cuando la compilación termine
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true # Sube el binario a TestFlight automáticamente para probarlo
        submit_to_app_store: false
