workflows:
  capacitor-ios-workflow:
    name: ZHomes iOS Production Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        - ios_signing
      vars:
        XCODE_PROJECT: "App.xcodeproj"
        XCODE_SCHEME: "App"
        APP_STORE_APP_ID: 6739819170 # Tu ID de Apple obtenido de tu consola
    scripts:
      - name: Install npm dependencies
        script: |
          cd zhomes-app
          npm install
      - name: Compile React/Vite code
        script: |
          cd zhomes-app
          npm run build
      - name: Recreate iOS Platform Workspace
        script: |
          cd zhomes-app
          rm -rf ios
          npx cap add ios
      - name: Sync Capacitor assets to iOS
        script: |
          cd zhomes-app
          npx cap sync ios


      - name: Decode signing files
        script: |
          python3 -c "import base64, os, plistlib; data = base64.b64decode(os.environ['CM_PROVISIONING_PROFILE'].replace('\n','').replace('\r','')); plist = plistlib.loads(data[data.find(b'<plist'):data.find(b'</plist>')+8]); uuid = plist['UUID']; target_dir = os.path.expanduser('~/Library/MobileDevice/Provisioning Profiles'); os.makedirs(target_dir, exist_ok=True); open(os.path.join(target_dir, f'{uuid}.mobileprovision'), 'wb').write(data); print(f'Instalado perfil con UUID: {uuid}')"
          python3 -c "import base64, os; open('/tmp/ios_distribution.p12', 'wb').write(base64.b64decode(os.environ['CM_CERTIFICATE'].replace('\n','').replace('\r','')))"
      - name: Set up keychain
        script: |
          keychain initialize
          keychain add-certificates -c /tmp/ios_distribution.p12 --certificate-password "$CM_CERTIFICATE_PASSWORD"
      - name: Patch Xcode project file for signing
        script: |
          python3 -c "import re; path = 'zhomes-app/ios/App/App.xcodeproj/project.pbxproj'; content = open(path).read(); content = re.sub(r'PRODUCT_BUNDLE_IDENTIFIER\s*=\s*[A-Za-z0-9._\'\"\-]*\s*;', 'PRODUCT_BUNDLE_IDENTIFIER = com.zhomesre.app;', content); content = re.sub(r'DevelopmentTeam\s*=\s*[A-Za-z0-9\'\"_]*\s*;', 'DevelopmentTeam = 98Z74Q5FCB;', content); content = re.sub(r'ProvisioningStyle\s*=\s*[A-Za-z0-9\'\"_]*\s*;', 'ProvisioningStyle = Manual;', content); open(path, 'w').write(content); print('Proyecto parcheado con Bundle ID, Team ID y firma Manual.')"
      - name: Set up code signing
        script: |
          cd zhomes-app/ios/App
          xcode-project use-profiles
      - name: Increment build number
        script: |
          cd zhomes-app/ios/App
          agvtool new-version -all $BUILD_NUMBER
      - name: Build ipa for App Store distribution
        script: |
          cd zhomes-app/ios/App
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - zhomes-app/ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - zhomesreapp@gmail.com # Te avisará cuando la compilación termine
        notify:
          success: true
          failure: true
